<main>
        <section class="container" style="padding: 4rem 0; max-width: 800px;">
            <h2 style="text-align: center; margin-bottom: 2rem;">Contáctanos</h2>
            <p style="text-align: center; margin-bottom: 2rem;">¿Tienes un equipo fallando o necesitas una cotización para cámaras? Escríbenos y un técnico se comunicará contigo.</p>
            
            <form id="contact-form" style="display: flex; flex-direction: column; gap: 1rem; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);">
                
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" style="padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px;">

                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="tu@correo.com" style="padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px;">

                <label for="servicio">Servicio de interés:</label>
                <select id="servicio" name="servicio" style="padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px;">
                    <option value="computadoras">Reparación de Computadoras</option>
                    <option value="impresoras">Mantenimiento de Impresoras</option>
                    <option value="redes">Instalación de Redes</option>
                    <option value="camaras">Cámaras de Seguridad</option>
                    <option value="otro">Otro</option>
                </select>

                <label for="mensaje">Describe el problema o requerimiento:</label>
                <textarea id="mensaje" name="mensaje" rows="5" placeholder="Mi computadora no enciende..." style="padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px; resize: vertical;"></textarea>

                <button type="submit" class="btn" style="border: none; cursor: pointer; font-size: 1rem; margin-top: 1rem;">Enviar Mensaje</button>
            </form>
        </section>
    </main>
